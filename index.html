<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CES Search</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#121212;
    color:#fff;
}

.topbar{
    position:sticky;
    top:0;
    background:#1b1b1b;
    padding:12px;
    border-bottom:1px solid #333;
    z-index:100;
}

.search-box{
    display:flex;
    gap:8px;
}

.search{
    flex:1;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#2a2a2a;
    color:white;
    font-size:16px;
    outline:none;
}

.search::placeholder{
    color:#999;
}

.icon-btn{
    border:none;
    border-radius:12px;
    background:#2a2a2a;
    color:white;
    width:48px;
    font-size:18px;
}

.container{
    padding:12px;
    max-width:900px;
    margin:auto;
}

.card{
    background:#1e1e1e;
    border-radius:16px;
    padding:16px;
    margin-bottom:16px;
    border:1px solid #2e2e2e;
}

.question{
    font-size:18px;
    font-weight:bold;
    margin-bottom:14px;
    line-height:1.5;
}

.answer{
    padding:12px;
    margin-bottom:10px;
    border-radius:12px;
    background:#2a2a2a;
    line-height:1.5;
}

.correct{
    background:#1d4d2f;
    border:1px solid #3ddc84;
}

mark{
    background:#ffd54f;
    color:black;
    border-radius:4px;
    padding:1px 3px;
}

.stats{
    margin-top:10px;
    margin-bottom:14px;
    color:#999;
    font-size:14px;
}

.empty{
    color:#777;
    text-align:center;
    margin-top:40px;
    line-height:1.6;
}

@media(max-width:600px){

    .question{
        font-size:17px;
    }

    .answer{
        font-size:15px;
    }

    .search{
        font-size:16px;
    }
}

</style>
</head>
<body>

<div class="topbar">

    <div class="search-box">

        <input
            id="search"
            class="search"
            placeholder="Search by first words..."
            autocomplete="off"
        >

        <button id="clearBtn" class="icon-btn">
            ✖
        </button>

        <button id="voiceBtn" class="icon-btn">
            🎤
        </button>

    </div>

</div>

<div class="container" id="results"></div>

<script>

let questions = [];

fetch("questions.json")
.then(r => r.json())
.then(data => {

    questions = data;

    render([]);
});

const results =
    document.getElementById("results");

const searchInput =
    document.getElementById("search");

const clearBtn =
    document.getElementById("clearBtn");

const voiceBtn =
    document.getElementById("voiceBtn");

function highlight(text, search){

    if(!search) return text;

    const escaped = search.replace(
        /[.*+?^${}()|[\]\\]/g,
        '\\$&'
    );

    const regex =
        new RegExp(`(${escaped})`, "gi");

    return text.replace(
        regex,
        "<mark>$1</mark>"
    );
}

function render(items, search=""){

    results.innerHTML = "";

    const stats =
        document.createElement("div");

    stats.className = "stats";

    stats.innerText =
        `Found: ${items.length}`;

    results.appendChild(stats);

    if(items.length === 0){

        const empty =
            document.createElement("div");

        empty.className = "empty";

        empty.innerHTML =
            "Type first 2-3 words<br>of the question";

        results.appendChild(empty);

        return;
    }

    items.forEach(q => {

        const card =
            document.createElement("div");

        card.className = "card";

        let answersHTML = "";

        q.answers.forEach(a => {

            answersHTML += `
                <div class="answer ${a.correct ? 'correct' : ''}">
                    ${highlight(a.text, search)}
                </div>
            `;
        });

        card.innerHTML = `
            <div class="question">
                ${highlight(q.question, search)}
            </div>

            ${answersHTML}
        `;

        results.appendChild(card);
    });
}

function similarity(a, b){

    a = a.toLowerCase();
    b = b.toLowerCase();

    if(a === b) return 1;

    if(a.includes(b) || b.includes(a))
        return 0.8;

    let matches = 0;

    for(
        let i = 0;
        i < Math.min(a.length, b.length);
        i++
    ){

        if(a[i] === b[i]) matches++;
    }

    return matches /
        Math.max(a.length, b.length);
}

function performSearch(value){

    value = value
        .trim()
        .toLowerCase();

    if(value === ""){

        render([]);
        return;
    }

    if(value === "checkall"){

        render(questions);
        return;
    }

    const filtered = questions.filter(q => {

        let question = q.question
            .replace(/^\s*\d+\.\s*/, "")
            .trim()
            .toLowerCase();

        return question.includes(value);
    });

    render(filtered, value);
}
    const filtered = questions.filter(q => {

        let question = q.question;

        question = question
            .replace(/^\d+\.\s*/, "")
            .trim()
            .toLowerCase();

        return question.includes(value);
    });

    render(filtered, value);
}

searchInput.addEventListener("input", e => {

    performSearch(e.target.value);
});

clearBtn.addEventListener("click", () => {

    searchInput.value = "";

    render([]);

    searchInput.focus();
});

if("webkitSpeechRecognition" in window){

    const recognition =
        new webkitSpeechRecognition();

    recognition.lang = "en-US";

    recognition.continuous = false;

    recognition.interimResults = false;

    voiceBtn.addEventListener("click", () => {

        recognition.start();
    });

    recognition.onresult = event => {

        const text =
            event.results[0][0].transcript;

        searchInput.value = text;

        performSearch(text);
    };
}

</script>

<script>

if("serviceWorker" in navigator){

    navigator.serviceWorker
        .register("./service-worker.js");
}

</script>

</body>
</html>
